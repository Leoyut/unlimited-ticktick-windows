name: Build TTPatcher

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish EXE
      run: dotnet publish TTPatcher.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./output

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TTPatcher-exe
        path: ./output/TTPatcher.exe
